<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Requests Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="icon" href="https://cdn.ipqow.com/i/hotlink-ok/lotuslabs/assets/llbrand/svg/LL_1%20Lotus.svg"
        type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="auth-overlay">
        <form class="login-form" id="login-form">
            <div class="login-header">
                <img class="login-logo"
                    src="https://cdn.ipqow.com/i/hotlink-ok/lotuslabs/assets/llbrand/svg/LL_1%20Lotus.svg" alt="Lotus">
                <h2>SongRequest</h2>
            </div>
            <div>
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Login</button>
        </form>
    </div>
    <div class="header-container">
        <header>
            <div class="title-container">
                <img class="logo" src="https://cdn.ipqow.com/i/hotlink-ok/lotuslabs/assets/llbrand/svg/LL_1%20Lotus.svg"
                    alt="Lotus">
                <h1>Song Requests Queue</h1>
                <span id="queue-size" class="queue-size">Queue: 0</span>
            </div>
            <div class="status-filters">
                <div class="filters">
                    <button class="filter-btn active" data-status="all">All</button>
                    <button class="filter-btn" data-status="pending">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 8V12L15 15M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <button class="filter-btn" data-status="approved">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 6L9 17L4 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <button class="filter-btn" data-status="denied">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                <div class="mod-buttons">
                <button id="quick-add-btn" class="quick-add-btn" title="Add song to queue + instant approval">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 4V20M4 12H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>Add
                </button>
                <button id="force-skip-btn" class="force-skip-btn" title="Skip Current Track">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 5V19L19 12L5 5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
                        <path d="M19 5V19" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>Skip
                </button>
            </div>
            </div>
        </header>
    </div>

    <main>
        <div id="requests-container" class="requests-grid"></div>
    </main>

    <div id="quick-add-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Quick Add Song</h2>
                <span class="close">&times;</span>
            </div>
            <form id="quick-add-form">
                <div class="form-group">
                    <label for="song-input">Spotify URL or Search Query</label>
                    <input type="text" id="song-input" required placeholder="Paste Spotify URL or enter search terms">
                </div>
                <button type="submit" class="submit-btn">Add Song</button>
            </form>
        </div>
    </div>

    <script>
        window.supabaseClient = supabase.createClient(
            'https://kbxmgkhkmmdzvzffxhaw.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtieG1na2hrbW1kenZ6ZmZ4aGF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE4ODkwMDYsImV4cCI6MjA1NzQ2NTAwNn0.TrjPdYwbOpj3_Fl31gSnjfXi-B7w3rARotXYctin8fU',
            {
                realtime: {
                    params: {
                        eventsPerSecond: 2
                    }
                },
                global: {
                    headers: {
                        'x-application-name': 'song-request-app'
                    }
                }
            }
        );
    </script>
    <script src="dashboard.js"></script>
</body>
</html>
